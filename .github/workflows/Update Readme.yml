name: Update Readme

on:
  schedule:
    - cron: "1 3 * * *"
  workflow_dispatch:

jobs:
  Update:
    name: Update Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
      - uses: mahyarmirrashed/action-github-readme-stats@main
        with:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          TIMEZONE: "America/Sao_Paulo"
          FEATURES: "DAY_STATS,WEEK_STATS,LANGUAGE_STATS"
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update readme via actions"
          git push
